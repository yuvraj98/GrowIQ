version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: growiq-postgres
    environment:
      POSTGRES_USER: growiq
      POSTGRES_PASSWORD: growiq_dev_2026
      POSTGRES_DB: growiq_development
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U growiq -d growiq_development"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: growiq-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
